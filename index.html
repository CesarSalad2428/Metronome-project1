<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome</title>
    <header>
        Big-Boom 1.7 
    </header>
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
<button id="toggle-rudiment">
Show Rudiment
</button>
<div class="rudiment-stuff hidden">
    <h3 class="Rcard-title">Rudiments</h3>
    <div class="rudiment-section">

        <div class="dropdown">

            <div class="dropdown-btn">
                <span id="selected-rudiment">
                    Paradiddle
                </span>
                <i class="fa-solid fa-chevron-down"></i>
            </div>

            <div class="dropdown-menu">
                <div class="dropdown-item">Paradiddle</div>
                <div class="dropdown-item">Flam Taps</div>
                <div class="dropdown-item">Flam Accent</div>
            </div>

        </div>
        
        <div class="rudiment-card">
            

            <img
                id="rudiment-image"
                src="rudiments/Paradiddle.png"
                alt="Rudiment">
        </div>

    </div>

</div>

    <div class="main-card">
        <h3 class="card-title">BPM</h3>

        <div class="input-row">
            <input id="bpm" type="number" value="60" min="1" max="300" hidden>
        </div>

        <div class="bpm-controls">

            <button class="bpm-btn" onclick="changeBPM(-1)">
                <i class="fa-solid fa-minus"></i>
            </button>
            <div class="bpm-counter">
                <h1 id="bpm-display">60</h1>
            </div>
            <button class="bpm-btn" onclick="changeBPM(1)">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        <div class="slider-row">
            <input type="range" id="bpm-slider" min="1" max="200" value="60">
        </div>
        <div class="buttons">
            <button onclick="toggleMetronome()" class="play-btn">
                <i id="play-icon" class="fa-solid fa-play"></i>
            </button>
        </div>
        <div class="subdivisions-section">
        <h3 class="sub-title">Subdivisions</h3>
            <div class="subdivisions">

                <button onclick="subdivision = 1" class="sub-btn">
                    <img src="Quarter_note.png" alt="Quarter">
                <button onclick="subdivision = 2" class="sub-btn">
                    <img src="Eighth_note.png" alt="Eighth">
                </button>

                <button onclick="subdivision = 3" class="sub-btn">
                    <img src="Triplet_note.png" alt="Triplet">
                </button>

                <button onclick="subdivision = 4" class="sub-btn">
                    <img src="Sixteenth_note.png" alt="Sixteenth">
                </button>
            </div>
    </div>

    <audio id="click-sound" src="Select.mp3" preload="auto"></audio>

    <script src="script.js"></script>

</body>
</html>
