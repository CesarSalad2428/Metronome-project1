<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome</title>
    <header>
        Met 1.4  
    </header>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="input-row">
            <label for="bpm">(BPM):</label> 
            <input id="bpm" type="number" value="60" min="1" max="300">
        </div>
        <div class="slider-row">
            <input type="range" id="bpm-slider" min="1" max="200" value="60">
            <span id="bpm-display">60</span>
        </div>
    
        <div class="buttons">
        <button onclick="start()" class="btn">Start</button>
        <button onclick="stop()" class="btn">End</button>
        </div>
        <div class="subdivisions">
            <button onclick="subdivision = 1" class="btn">Quarter</button>
            <button onclick="subdivision = 2" class="btn">Eighth</button>
            <button onclick="subdivision = 3" class="btn">Triplet</button>
            <button onclick="subdivision = 4" class="btn">Sixteenth</button>
        </div>
    </div> 

    <script src="script.js"></script>
    
    
</body>
</html>
